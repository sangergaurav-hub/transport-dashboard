<!DOCTYPE html>
<html>
<head>
    <title>Transport Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }

        h1 {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <h1>🚆 Customer Journeys Dashboard</h1>

    <div class="card">
        <h2>Metro</h2>
        <p>Performance: 100%</p>
    </div>

    <div class="card">
        <h2>Trains</h2>
        <p>Performance: 95%</p>
    </div>

    <div class="card">
        <h2>Buses</h2>
        <p>Performance: 96%</p>
    </div>

    <div class="card">
        <h2>Ferries</h2>
        <p>Performance: 99%</p>
    </div>
</body>
</html>
